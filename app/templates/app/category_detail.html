{% extends "app/layout.html" %}
{% load static %} {% block content %}
<div class="row" style="display: flex; flex-wrap: wrap;">
    {% for p in products %}
    <div class="col-md-4" style="display: flex; margin-bottom: 20px;">
        <div class="thumbnail" style="text-align: center; padding: 20px; width: 100%; display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                {% if p.image %}
                    <img src="{{ p.image.url }}" alt="{{ p.name }}" style="max-width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px;">
                {% else %}
                    <img src="{% static 'app/images/logo.png' %}" alt="Нет фото" style="max-width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px;">
                {% endif %}
                
                <div class="caption">
                    <h3>{{ p.name }}</h3>
                    <p class="text-muted">{{ p.short_description }}</p>
                </div>
            </div>
            <div>
                <h4 style="color: #d9534f;"><strong>{{ p.price }} ₽</strong></h4>
                <p style="margin-top: 15px;">
                    <a href="#" class="btn btn-primary">В корзину</a>
                    <a href="{% url 'product_detail' p.id %}" class="btn btn-default">Подробнее</a>
                </p>
            </div>
        </div>
    </div>
    {% empty %}
        <p class="alert alert-info">В этой категории пока нет товаров.</p>
    {% endfor %}
</div>

{% endblock %}
