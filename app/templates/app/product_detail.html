{% extends "app/layout.html" %}

{% block content %}
{% load static %}
<div class="row" style="margin-top: 30px;">
    <div class="col-md-6">
        {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.name }}" class="img-responsive thumbnail">
        {% else %}
            <img src="{% static 'app/images/logo.png' %}" alt="Нет фото" class="img-responsive thumbnail">
        {% endif %}
    </div>
    <div class="col-md-6">
        <h1>{{ product.name }}</h1>
        <p class="label label-info">{{ product.category.name }}</p>
        <h3 style="color: #d9534f;">{{ product.price }} ₽</h3>
        <hr/>
        <h4>Описание:</h4>
        <div style="font-size: 16px; line-height: 1.6;">
            {{ product.full_description|linebreaks }}
        </div>
        
        <p style="margin-top: 30px;">
            <a href="#" class="btn btn-primary btn-lg">Купить</a>
            <button onclick="history.back()" class="btn btn-default btn-lg">Назад</button>
        </p>

    </div>
</div>
{% endblock %}
